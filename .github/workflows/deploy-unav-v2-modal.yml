name: Deploy UNAV to Modal

on:
  workflow_dispatch:
    inputs:
      scaledown_window:
        description: "Modal scaledown window in seconds"
        required: true
        default: "300"
      gpu_type:
        description: "GPU type for Modal deployment"
        required: true
        default: "t4"
        type: choice
        options:
          - a10
          - t4
          - any
          - a100
      ram_option:
        description: "RAM option for Modal deployment"
        required: true
        default: "current"
        type: choice
        options:
          - current
          - modal_max
          - custom
      modal_max_ram_mb:
        description: "Modal allowed RAM limit in MiB (you specify this)"
        required: true
        default: "73728"
      custom_ram_mb:
        description: "Custom RAM in MiB (used when ram_option=custom)"
        required: true
        default: "73728"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate deploy inputs
        run: |
          python - <<'PY'
          import os
          value = os.environ["UNAV_SCALEDOWN_WINDOW"]
          parsed = int(value)
          if parsed <= 0:
              raise ValueError("scaledown_window must be a positive integer")
          gpu = os.environ["UNAV_GPU_TYPE"].strip().lower()
          if gpu not in {"a10", "t4", "any", "a100"}:
              raise ValueError("gpu_type must be one of: a10, t4, any, a100")
          ram_option = os.environ["UNAV_RAM_OPTION"].strip().lower()
          if ram_option not in {"current", "modal_max", "custom"}:
              raise ValueError("ram_option must be one of: current, modal_max, custom")
          modal_max_mb = int(os.environ["UNAV_MODAL_MAX_RAM_MB"])
          custom_mb = int(os.environ["UNAV_CUSTOM_RAM_MB"])
          if modal_max_mb <= 0:
              raise ValueError("modal_max_ram_mb must be a positive integer")
          if custom_mb <= 0:
              raise ValueError("custom_ram_mb must be a positive integer")
          if custom_mb > modal_max_mb:
              raise ValueError(
                  "custom_ram_mb cannot exceed modal_max_ram_mb because Modal enforces a max per container"
              )
          if ram_option == "current":
              resolved_ram_mb = 73728
          elif ram_option == "modal_max":
              resolved_ram_mb = modal_max_mb
          else:
              resolved_ram_mb = custom_mb
          print(f"Using UNAV_SCALEDOWN_WINDOW={parsed}")
          print(f"Using UNAV_GPU_TYPE={gpu}")
          print(f"Using UNAV_RAM_OPTION={ram_option}")
          print(f"Using UNAV_MODAL_MAX_RAM_MB={modal_max_mb}")
          print(f"Using UNAV_CUSTOM_RAM_MB={custom_mb}")
          print(f"Resolved UNAV memory (MiB): {resolved_ram_mb}")
          PY
        env:
          UNAV_SCALEDOWN_WINDOW: ${{ inputs.scaledown_window }}
          UNAV_GPU_TYPE: ${{ inputs.gpu_type }}
          UNAV_RAM_OPTION: ${{ inputs.ram_option }}
          UNAV_MODAL_MAX_RAM_MB: ${{ inputs.modal_max_ram_mb }}
          UNAV_CUSTOM_RAM_MB: ${{ inputs.custom_ram_mb }}

      - name: Deployment metadata
        run: |
          echo "Triggered by: $GITHUB_ACTOR"
          echo "Run URL: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo "### UNav v2 Modal Deployment"
            echo "- Triggered by: \`$GITHUB_ACTOR\`"
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- GPU type: \`${UNAV_GPU_TYPE}\`"
            echo "- Scaledown window: \`${UNAV_SCALEDOWN_WINDOW}\`"
            echo "- RAM option: \`${UNAV_RAM_OPTION}\`"
            echo "- Modal max RAM (MiB): \`${UNAV_MODAL_MAX_RAM_MB}\`"
            echo "- Custom RAM (MiB): \`${UNAV_CUSTOM_RAM_MB}\`"
            echo "- Run URL: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          UNAV_SCALEDOWN_WINDOW: ${{ inputs.scaledown_window }}
          UNAV_GPU_TYPE: ${{ inputs.gpu_type }}
          UNAV_RAM_OPTION: ${{ inputs.ram_option }}
          UNAV_MODAL_MAX_RAM_MB: ${{ inputs.modal_max_ram_mb }}
          UNAV_CUSTOM_RAM_MB: ${{ inputs.custom_ram_mb }}

      - name: Validate required secrets are present
        run: |
          python - <<'PY'
          import os
          missing = [
              key for key in ("MODAL_TOKEN_ID", "MODAL_TOKEN_SECRET")
              if not os.environ.get(key)
          ]
          if missing:
              raise ValueError(f"Missing required GitHub Actions secrets: {', '.join(missing)}")
          print("Required secrets are configured.")
          PY
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          UNAV_SCALEDOWN_WINDOW: ${{ inputs.scaledown_window }}
          UNAV_GPU_TYPE: ${{ inputs.gpu_type }}
          UNAV_RAM_OPTION: ${{ inputs.ram_option }}
          UNAV_MODAL_MAX_RAM_MB: ${{ inputs.modal_max_ram_mb }}
          UNAV_CUSTOM_RAM_MB: ${{ inputs.custom_ram_mb }}
        run: |
          modal deploy -m src.modal_functions.unav_v2.unav_modal
