name: Deploy UNAV to Modal

on:
  workflow_dispatch:
    inputs:
      scaledown_window:
        description: "Modal scaledown window in seconds"
        required: true
        default: "300"
      gpu_type:
        description: "GPU type for Modal deployment"
        required: true
        default: "t4"
        type: choice
        options:
          - a10
          - t4
          - any
          - a100
      ram_mb:
        description: "RAM reservation in MiB (max in this workflow: 73728)"
        required: true
        default: "73728"
        type: choice
        options:
          - "49152" # 48 GiB
          - "65536" # 64 GiB
          - "73728" # 72 GiB (current + max in this workflow)

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate deploy inputs
        run: |
          python - <<'PY'
          import os
          value = os.environ["UNAV_SCALEDOWN_WINDOW"]
          parsed = int(value)
          if parsed <= 0:
              raise ValueError("scaledown_window must be a positive integer")
          gpu = os.environ["UNAV_GPU_TYPE"].strip().lower()
          if gpu not in {"a10", "t4", "any", "a100"}:
              raise ValueError("gpu_type must be one of: a10, t4, any, a100")
          ram_mb = int(os.environ["UNAV_RAM_MB"])
          max_ram_mb = 73728
          if ram_mb <= 0:
              raise ValueError("ram_mb must be a positive integer")
          if ram_mb > max_ram_mb:
              raise ValueError(f"ram_mb cannot exceed configured max ({max_ram_mb} MiB)")
          print(f"Using UNAV_SCALEDOWN_WINDOW={parsed}")
          print(f"Using UNAV_GPU_TYPE={gpu}")
          print(f"Using UNAV_RAM_MB={ram_mb}")
          print(f"Configured workflow max RAM (MiB): {max_ram_mb}")
          PY
        env:
          UNAV_SCALEDOWN_WINDOW: ${{ inputs.scaledown_window }}
          UNAV_GPU_TYPE: ${{ inputs.gpu_type }}
          UNAV_RAM_MB: ${{ inputs.ram_mb }}

      - name: Deployment metadata
        run: |
          echo "Triggered by: $GITHUB_ACTOR"
          echo "Run URL: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo "### UNav v2 Modal Deployment"
            echo "- Triggered by: \`$GITHUB_ACTOR\`"
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- GPU type: \`${UNAV_GPU_TYPE}\`"
            echo "- Scaledown window: \`${UNAV_SCALEDOWN_WINDOW}\`"
            echo "- RAM reservation (MiB): \`${UNAV_RAM_MB}\`"
            echo "- Configured max RAM (MiB): \`73728\`"
            echo "- Run URL: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          UNAV_SCALEDOWN_WINDOW: ${{ inputs.scaledown_window }}
          UNAV_GPU_TYPE: ${{ inputs.gpu_type }}
          UNAV_RAM_MB: ${{ inputs.ram_mb }}

      - name: Validate required secrets are present
        run: |
          python - <<'PY'
          import os
          missing = [
              key for key in ("MODAL_TOKEN_ID", "MODAL_TOKEN_SECRET")
              if not os.environ.get(key)
          ]
          if missing:
              raise ValueError(f"Missing required GitHub Actions secrets: {', '.join(missing)}")
          print("Required secrets are configured.")
          PY
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          UNAV_SCALEDOWN_WINDOW: ${{ inputs.scaledown_window }}
          UNAV_GPU_TYPE: ${{ inputs.gpu_type }}
          UNAV_RAM_MB: ${{ inputs.ram_mb }}
        run: |
          modal deploy -m src.modal_functions.unav_v2.unav_modal
